name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check jottit tests

      - name: Ruff format check
        run: uv run ruff format --check jottit tests

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -v
