# Fly.io deployment config.
#
# Targets the existing `jottit-pub` app + `jottit-pub-db` Postgres. When
# we move to jottit.org later, swap `app`, `JOTTIT_DOMAIN`, and the
# health check Host header — no other change needed.
#
# Secrets (set via `fly secrets set`):
#   DATABASE_URL  — emitted by `fly postgres attach jottit-pub-db`
#   SECRET_KEY    — Flask session signing key (random)
#   RESEND_API_KEY, MAIL_FROM — outbound mail
#   TURNSTILE_SITEKEY, TURNSTILE_SECRET — front-page anti-spam

app = 'jottit-pub'
primary_region = 'iad'

[build]

[env]
  PORT = '8000'
  JOTTIT_DOMAIN = 'jottit.pub'

[deploy]
  release_command = 'alembic upgrade head'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '10s'
    method = 'GET'
    timeout = '2s'
    path = '/healthz'
    [http_service.checks.headers]
      Host = 'jottit.pub'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
