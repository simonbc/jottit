{% extends "site_base.html" %}
{% block title %}Delete site{% endblock %}

{% block content %}
  <h1>Delete site</h1>

  <p>This will remove the site from public listings and free its subdomain. Pages and revisions stay on file in case we ever add a restore path.</p>

  <form method="post" action="" id="delete_site_form" class="form">
    <div class="form-actions">
      <button type="submit">Delete this site</button>
      <a href="{{ site_root_path }}admin/settings" class="button-cancel">Cancel</a>
    </div>
  </form>
{% endblock %}
