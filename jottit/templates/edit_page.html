{% extends "site_base.html" %}

{% block title %}Edit: {{ page_name or "Home" }}{% if site and site.title %} — {{ site.title }}{% endif %}{% endblock %}

{% block content %}
  <div class="edit-page">
    <h1 class="edit-heading">Editing: <span class="page_name">{{ page_name or "Home" }}</span></h1>

    <form method="post" action="" id="edit_form" class="form">
      <input type="hidden" name="current_revision" value="{{ current_revision }}">
      <p>
        <label for="content_text" class="visually-hidden">Page content (Markdown)</label>
        <textarea id="content_text" name="content" rows="20" cols="80" autofocus>{{ content }}</textarea>
      </p>
      <div class="form-actions edit-actions">
        <button type="submit">Save</button>
        <a class="button-cancel" href="{{ site_root_path }}{{ page_slug(page_name) }}">Cancel</a>
        {% if page_name %}
          <button type="submit" name="delete" value="1" id="delete">Delete page</button>
        {% endif %}
      </div>
    </form>
  </div>
{% endblock %}
