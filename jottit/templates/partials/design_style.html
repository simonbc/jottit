{# Per-site overrides written into :root so the global stylesheet
   picks them up via var(--…). Empty values leave the token defaults
   from tokens.css in place. #}
<style>
  :root {
    {% if design.header_color %}--color-header: {{ design.header_color }};{% endif %}
    {% if design.title_color %}--color-title: {{ design.title_color }};{% endif %}
    {% if design.subtitle_color %}--color-subtitle: {{ design.subtitle_color }};{% endif %}
    {% if design.title_font %}--font-family-title: {{ design.title_font|replace("_", " ") }}, sans-serif;{% endif %}
    {% if design.subtitle_font %}--font-family-subtitle: {{ design.subtitle_font|replace("_", " ") }}, sans-serif;{% endif %}
    {% if design.headings_font %}--font-family-headings: {{ design.headings_font|replace("_", " ") }}, sans-serif;{% endif %}
    {% if design.content_font %}--font-family-content: {{ design.content_font|replace("_", " ") }}, sans-serif;{% endif %}
  }
</style>
